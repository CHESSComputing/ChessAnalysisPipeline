config:
  root: examples/tomo
  inputdir: config
  outputdir: hollow_pyramid
  interactive: true
  log_level: info
  profile: false

map:

  # Convert the CHESS style map
  - common.YAMLReader:
      filename: detector_id3a_pyramid.yaml
      schema: common.models.map.DetectorConfig
  - common.YAMLReader:
      filename: map_id3a_pyramid.yaml
      schema: common.models.map.MapConfig
  - common.MapProcessor:
#      config:
#        title: hollow_pyramid
#        station: id3a
#        experiment_type: TOMO
#        sample:
#          name: hollow_pyramid
#        spec_scans:
#        - spec_file: ../data/hollow_pyramid/spec.log
#          scan_numbers: [3, 4, 5]
#        independent_dimensions:
#        - label: rotation_angles
#          units: degrees
#          data_type: scan_column
#          name: theta
#        - label: x_translation
#          units: mm
#          data_type: smb_par
#          name: ramsx
#        - label: z_translation
#          units: mm
#          data_type: smb_par
#          name: ramsz
#      detector_config:
#        detectors:
#          - id: sim
      num_proc: 1
      schema: tomofields
  - common.NexusWriter:
      filename: map_hollow_pyramid.nxs
      force_overwrite: true

convert:

  - common.NexusReader:
      filename: map_hollow_pyramid.nxs
      schema: tomofields
  - common.SpecReader:
      config:
        station: id3a
        experiment_type: TOMO
        spec_scans:
        - spec_file: ../data/hollow_pyramid/spec.log
          scan_numbers: 1
      detector_config:
        detectors:
          - id: sim
      schema: darkfield
  - common.SpecReader:
      inputdir: ../data/hollow_pyramid
      config:
        station: id3a
        experiment_type: TOMO
        spec_scans:
        - spec_file: spec.log
          scan_numbers: 2
      detector_config:
        detectors:
          - id: sim
      schema: brightfield
  - common.YAMLReader:
      filename: detector_pyramid.yaml
      schema: tomo.models.Detector
  - tomo.TomoCHESSMapConverter
  - common.NexusWriter:
      filename: chess_map_hollow_pyramid.nxs
      force_overwrite: true

reduce:

  # Data reduction
  - common.NexusReader:
      filename: chess_map_hollow_pyramid.nxs
  - tomo.TomoReduceProcessor:
      save_figures: true
  - tomo.TomoWriter:
      filename: reduced_hollow_pyramid.nxs
      force_overwrite: true
  - common.ImageWriter:
      outputdir: saved_figures
      force_overwrite: true

find_center:

  - common.NexusReader:
      filename: reduced_hollow_pyramid.nxs
  - common.YAMLReader:
      filename: find_center_id3a.yaml
      schema: tomo.models.TomoFindCenterConfig
  - tomo.TomoFindCenterProcessor:
#      config:
#        gaussian_sigma: 0.05
#        ring_width: 1
      save_figures: true
  - common.YAMLWriter:
      filename: center_hollow_pyramid.yaml
      force_overwrite: true
  - common.ImageWriter:
      outputdir: saved_figures
      force_overwrite: true

recon:

  - common.NexusReader:
      filename: reduced_hollow_pyramid.nxs
  - common.YAMLReader:
      filename: center_hollow_pyramid.yaml
      schema: tomo.models.TomoFindCenterConfig
  - common.YAMLReader:
      filename: reconstruct_data.yaml
      schema: tomo.models.TomoReconstructConfig
  - tomo.TomoReconstructProcessor:
#      config:
#        x_bounds: [15, 390]
#        y_bounds: [25, 380]
#        secondary_iters: 10
#        ring_width: 1
      save_figures: true
  - tomo.TomoWriter:
      filename: reconstructed_hollow_pyramid.nxs
      force_overwrite: true
  - common.ImageWriter:
      outputdir: saved_figures
      force_overwrite: true


combine:

  - common.NexusReader:
      filename: reconstructed_hollow_pyramid.nxs
  - common.YAMLReader:
      filename: combine_data_id3a.yaml
      schema: tomo.models.TomoCombineConfig
  - tomo.TomoCombineProcessor:
#      config:
#        z_bounds: [2, 57]
      save_figures: true
  - tomo.TomoWriter:
      filename: combined_hollow_pyramid.nxs
      force_overwrite: true
  - common.ImageWriter:
      outputdir: saved_figures
      force_overwrite: true
