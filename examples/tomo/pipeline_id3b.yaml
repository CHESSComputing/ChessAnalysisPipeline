config:
  root: examples/tomo
  inputdir: config
  outputdir: reduced/hollow_cube
  interactive: true
  log_level: info
  profile: false

map:

  # Convert the CHESS style map
  - common.YAMLReader:
      filename: map_id3b.yaml
      schema: common.models.map.MapConfig
  - common.MapProcessor:
      num_proc: 1
      detector_config:
        detectors:
          - id: sim
      schema: tomofields
  - common.SpecReader:
      config:
        station: id3b
        experiment_type: TOMO
        spec_scans:
        - spec_file: ../raw/hollow_cube/hollow_cube
          scan_numbers: 1
      detector_config:
        detectors:
          - id: sim
      schema: darkfield
  - common.SpecReader:
      inputdir: ../raw/hollow_cube
      config:
        station: id3b
        experiment_type: TOMO
        spec_scans:
        - spec_file: hollow_cube
          scan_numbers: 2
      detector_config:
        detectors:
          - id: sim
      schema: brightfield
  - common.YAMLReader:
      filename: detector.yaml
      schema: tomo.models.Detector
  - tomo.TomoCHESSMapConverter
  - common.NexusWriter:
      filename: chess_map_hollow_cube.nxs
      force_overwrite: true
 
full_recon:

  # Full tomography reconstruction
  - common.NexusReader:
      filename: chess_map_hollow_cube.nxs
  - common.YAMLReader:
      filename: reduce_data_id3b.yaml
      schema: tomo.models.TomoReduceConfig
  - tomo.TomoReduceProcessor:
      save_figures: true
  - common.ImageWriter:
      outputdir: saved_figures
      force_overwrite: true

  - common.YAMLReader:
      filename: find_center_id3b.yaml
      schema: tomo.models.TomoFindCenterConfig
  - tomo.TomoFindCenterProcessor:
      save_figures: true
  - common.ImageWriter:
      outputdir: saved_figures
      force_overwrite: true

  - common.YAMLReader:
      filename: reconstruct_data.yaml
      schema: tomo.models.TomoReconstructConfig
  - tomo.TomoReconstructProcessor:
      save_figures: true
  - common.NexusWriter:
      filename: reconstructed_data.nxs
      force_overwrite: true
